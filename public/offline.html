<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — BSC Portal</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0A4566">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:#f1f5f9;color:#0f172a;padding:24px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;max-width:380px;width:100%;
      padding:32px 28px;text-align:center;box-shadow:0 10px 40px rgba(2,8,23,.06)}
    img{height:46px;margin-bottom:18px}
    h1{font-size:18px;margin:0 0 8px}
    p{font-size:14px;color:#64748b;margin:0 0 22px;line-height:1.5}
    button{background:#0A4566;color:#fff;border:0;border-radius:12px;padding:12px 22px;
      font-size:14px;font-weight:600;cursor:pointer}
    button:active{opacity:.85}
  </style>
</head>
<body>
  <div class="card">
    <img src="/img/bsc-logo.png" alt="BSC">
    <h1>You're offline</h1>
    <p>The BSC Portal needs an internet connection to load tickets, expenses and reports. Please reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
