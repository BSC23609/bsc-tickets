<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outpass / Gate Pass — BSC</title>
  <link rel="stylesheet" href="/css/bsc.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A4566">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BSC Portal">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <style>body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}[x-cloak]{display:none}</style>
</head>
<body class="min-h-screen bg-white text-ink">

  <!-- Header -->
  <header class="bg-white/90 backdrop-blur border-b border-line sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
      <img src="/img/group-logo.png" alt="The Bharat Steel Group" class="h-7 shrink-0" />
      <div class="flex items-center gap-4 text-sm">
        <a href="/home.html" class="text-slate-500 hover:text-ink font-medium">Home</a>
        <span id="who" class="hidden sm:inline text-slate-400 mono text-xs"></span>
        <button onclick="logout()" class="text-slate-500 hover:text-ink font-medium">Sign out</button>
      </div>
      <img src="/img/bsc-logo.png" alt="Bharat Steel (Chennai)" class="h-7 shrink-0" />
    </div>
    <div class="seam"></div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-7">
    <div class="mb-5">
      <div class="eyebrow">Outpass / Gate Pass</div>
      <h1 class="font-display text-2xl font-bold text-ink mt-0.5">Leave-premises requests</h1>
    </div>

    <!-- Tabs -->
    <div class="flex gap-6 border-b border-line mb-6">
      <button data-tab="new" data-active="true" class="tabBtn tab">New request</button>
      <button data-tab="mine" data-active="false" class="tabBtn tab">My requests</button>
      <button data-tab="appr" id="apprTab" data-active="false" class="tabBtn tab">To approve <span id="apprCount" class="pill bg-amber-100 text-amber-700 ml-1 hidden"></span></button>
    </div>

    <!-- NEW REQUEST -->
    <section id="tab-new" class="in">
      <div class="card p-6 max-w-2xl">
        <!-- Type toggle -->
        <label class="fieldlabel">Pass type</label>
        <div class="grid grid-cols-2 gap-2 mb-4 max-w-sm">
          <button type="button" id="type-outpass" onclick="setType('outpass')" class="typeBtn border-2 rounded-xl px-3 py-3 text-sm font-semibold">Outpass</button>
          <button type="button" id="type-gatepass" onclick="setType('gatepass')" class="typeBtn border-2 rounded-xl px-3 py-3 text-sm font-semibold">Gatepass</button>
        </div>

        <label class="flex items-center gap-2 text-sm mb-4 select-none">
          <input id="og_onduty" type="checkbox" class="rounded border-slate-300" />
          <span class="font-medium">On duty</span>
          <span class="text-slate-400">— official outing</span>
        </label>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="fieldlabel">Date</label>
            <input id="og_date" type="date" class="field" />
          </div>
          <div class="sm:col-span-2">
            <label class="fieldlabel">Approval from</label>
            <input id="og_approver_name" class="field" disabled placeholder="Auto — your department head" />
            <label class="flex items-center gap-2 mt-2 text-sm text-slate-600 cursor-pointer">
              <input id="og_onleave" type="checkbox" onchange="onLeaveToggle()" />
              My reporting manager / dept head is on leave
            </label>
          </div>

          <div>
            <label class="fieldlabel">Employee code</label>
            <input id="og_code" class="field" disabled />
          </div>
          <div>
            <label class="fieldlabel">Name</label>
            <input id="og_name" class="field" disabled />
          </div>
          <div class="sm:col-span-2">
            <label class="fieldlabel">Designation</label>
            <input id="og_desig" class="field" disabled />
          </div>

          <div>
            <label class="fieldlabel">Out-time</label>
            <input id="og_out" type="time" class="field" />
          </div>
          <div id="inWrap">
            <label class="fieldlabel">In-time <span class="text-slate-400 normal-case font-normal">(gatepass)</span></label>
            <input id="og_in" type="time" class="field" />
          </div>

          <div class="sm:col-span-2">
            <label class="fieldlabel">Purpose</label>
            <textarea id="og_purpose" rows="2" class="field" placeholder="Reason for leaving the premises"></textarea>
          </div>
        </div>

        <div class="mt-6 flex justify-end">
          <button id="ogSubmit" onclick="submitReq()" class="btn">Submit request</button>
        </div>
      </div>
    </section>

    <!-- MY REQUESTS -->
    <section id="tab-mine" class="hidden"><div id="myList" class="space-y-3"></div></section>
    <!-- TO APPROVE -->
    <section id="tab-appr" class="hidden"><div id="apprList" class="space-y-3"></div></section>
  </main>

  <!-- Detail / approval modal -->
  <div id="ogModal" class="hidden fixed inset-0 bg-ink/50 backdrop-blur-sm z-40 flex items-start justify-center p-4 overflow-y-auto" onclick="if(event.target===this)closeModal()">
    <div class="card modal-in max-w-xl w-full my-8" id="ogModalInner"></div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    let me = {}, autoApprover = null, leaveApprover = null, ogType = 'outpass';
    const deepId = new URLSearchParams(location.search).get('id');

    const typeLabel = t => t === 'gatepass' ? 'Gatepass' : 'Outpass';
    function statusPill(s) {
      const m = { pending: ['bg-amber-100 text-amber-700', 'Pending'],
                  approved: ['bg-emerald-100 text-emerald-700', 'Approved'],
                  rejected: ['bg-red-100 text-red-700', 'Rejected'] }[s] || ['bg-slate-100 text-slate-600', s];
      return `<span class="pill ${m[0]}"><span class="dot"></span>${m[1]}</span>`;
    }
    function to12h(v) {
      if (!v) return '';
      const [h, m] = v.split(':').map(Number);
      const ap = h >= 12 ? 'PM' : 'AM'; let hh = h % 12; if (hh === 0) hh = 12;
      return `${String(hh).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;
    }

    async function init() {
      me = await api('/me');
      document.getElementById('who').textContent = `${me.name} · ${me.emp_no}`;
      const meta = await api('/outpass/meta');
      autoApprover = meta.approver;
      leaveApprover = meta.leave_approver;
      document.getElementById('og_code').value = meta.me.emp_no;
      document.getElementById('og_name').value = meta.me.name;
      document.getElementById('og_desig').value = meta.me.designation || '—';
      document.getElementById('og_date').value = new Date().toISOString().slice(0, 10);
      onLeaveToggle();
      setType('outpass');
      setupTabs();
      refreshApprCount();
      if (deepId) { switchTab('appr'); openDetail(deepId); }
    }

    function setType(t) {
      ogType = t;
      ['outpass', 'gatepass'].forEach(x => {
        const b = document.getElementById('type-' + x);
        const on = x === t;
        b.classList.toggle('bg-ink', on); b.classList.toggle('text-white', on); b.classList.toggle('border-ink', on);
        b.classList.toggle('bg-white', !on); b.classList.toggle('text-slate-700', !on); b.classList.toggle('border-line', !on);
      });
      document.getElementById('inWrap').style.display = t === 'gatepass' ? '' : 'none';
    }

    function onLeaveToggle() {
      const onLeave = document.getElementById('og_onleave').checked;
      const a = onLeave ? leaveApprover : autoApprover;
      document.getElementById('og_approver_name').value =
        a ? `${a.name} (${a.label})` : 'No approver set — contact admin';
    }

    async function submitReq() {
      const onLeave = document.getElementById('og_onleave').checked;
      const approver = onLeave ? leaveApprover : autoApprover;
      const purpose = document.getElementById('og_purpose').value.trim();
      const out_time = to12h(document.getElementById('og_out').value);
      const in_time = to12h(document.getElementById('og_in').value);
      if (!approver) return toast('No approver is set for your department — contact admin', 'error');
      if (!purpose) return toast('Enter the purpose', 'error');
      if (!out_time) return toast('Enter the out-time', 'error');
      if (ogType === 'gatepass' && !in_time) return toast('Enter the in-time', 'error');

      const btn = document.getElementById('ogSubmit');
      btn.disabled = true; btn.textContent = 'Submitting…';
      try {
        const r = await api('/outpass', { method: 'POST', body: {
          type: ogType, on_duty: document.getElementById('og_onduty').checked,
          req_date: document.getElementById('og_date').value,
          purpose, out_time, in_time, manager_on_leave: onLeave } });
        toast(`Request ${r.ref_no} sent for approval`, 'success');
        document.getElementById('og_purpose').value = '';
        document.getElementById('og_onduty').checked = false;
        document.getElementById('og_onleave').checked = false;
        onLeaveToggle();
        switchTab('mine');
      } catch (e) { toast(e.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Submit request'; }
    }

    // ---- tabs ----
    function setupTabs() {
      document.querySelectorAll('.tabBtn').forEach(b =>
        b.addEventListener('click', () => switchTab(b.dataset.tab)));
    }
    function switchTab(tab) {
      document.querySelectorAll('.tabBtn').forEach(b => b.setAttribute('data-active', b.dataset.tab === tab));
      ['new', 'mine', 'appr'].forEach(t => document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab));
      if (tab === 'mine') loadList('mine', 'myList');
      if (tab === 'appr') loadList('approvals', 'apprList');
    }

    async function refreshApprCount() {
      const rows = await api('/outpass?scope=approvals');
      const pending = rows.filter(r => r.status === 'pending').length;
      const el = document.getElementById('apprCount');
      el.textContent = pending; el.classList.toggle('hidden', pending === 0);
    }

    async function loadList(scope, elId) {
      const el = document.getElementById(elId);
      el.innerHTML = '<div class="text-sm text-slate-400 py-8 text-center">Loading…</div>';
      try {
        const rows = await api(`/outpass?scope=${scope}`);
        if (!rows.length) {
          el.innerHTML = `<div class="text-sm text-slate-400 py-12 text-center">${scope === 'mine' ? 'No requests yet — create one above.' : 'Nothing waiting on you.'}</div>`;
          return;
        }
        el.innerHTML = rows.map(o => card(o, scope)).join('');
      } catch (e) {
        el.innerHTML = `<div class="text-sm text-red-500 py-8 text-center">Couldn't load — ${e.message}</div>`;
      }
    }

    function card(o, scope) {
      const who = scope === 'approvals' ? `From ${o.requester_name}` : `To ${o.approver_name || o.approver_label}`;
      return `<div onclick="openDetail(${o.id})" class="card lift p-4">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="mono text-[11px] text-slate-400">${o.ref_no}</span>
              ${statusPill(o.status)}
              <span class="pill bg-brand-50 text-brand-700">${o.type_label}</span>
              ${o.on_duty ? '<span class="pill bg-emerald-50 text-emerald-700">On duty</span>' : ''}
            </div>
            <div class="font-semibold text-ink mt-1.5 truncate">${o.purpose}</div>
            <div class="text-xs text-slate-500 mt-1">${who} · Out ${o.out_time}${o.in_time ? ' · In ' + o.in_time : ''}</div>
          </div>
          <div class="text-right text-[11px] text-slate-400 shrink-0 mono">${fmtDate(o.req_date)}</div>
        </div>
      </div>`;
    }

    // ---- detail / approval ----
    async function openDetail(id) {
      let o;
      try { o = await api('/outpass/' + id); }
      catch (e) { toast(e.message, 'error'); return; }
      const p = o.perms;
      const actions = p.canAction
        ? `<div class="flex gap-2 pt-2">
             <button onclick="approve(${o.id})" class="btn text-sm" style="padding:.55rem 1.1rem">Approve</button>
             <button onclick="showReject(${o.id})" class="text-white text-sm font-semibold px-4 py-2.5 rounded-xl bg-red-600 hover:bg-red-700 transition">Reject</button>
           </div>`
        : '';
      const dl = o.status === 'approved' && p.isRequester
        ? `<a href="/dl/${o.pdf_token}" target="_blank" class="btn-ghost text-sm mt-1 inline-flex">Download pass</a>` : '';
      const rejBox = o.status === 'rejected'
        ? `<div class="bg-red-50 border border-red-200 rounded-xl p-3 text-sm"><div class="eyebrow" style="color:#b91c1c">Rejected</div><div class="text-ink mt-0.5">${o.reject_reason || ''}</div></div>` : '';

      document.getElementById('ogModalInner').innerHTML = `
        <div class="seam rounded-t-2xl"></div>
        <div class="p-5 border-b border-line flex items-start justify-between">
          <div>
            <div class="mono text-[11px] text-slate-400">${o.ref_no}</div>
            <h3 class="font-display font-bold text-lg text-ink mt-0.5">${o.type_label}${o.on_duty ? ' · On duty' : ''}</h3>
            <div class="mt-2">${statusPill(o.status)}</div>
          </div>
          <button onclick="closeModal()" class="text-slate-400 hover:text-ink text-2xl leading-none">&times;</button>
        </div>
        <div class="p-5 space-y-4 text-sm">
          <div class="grid grid-cols-2 gap-3">
            ${field('Date', fmtDate(o.req_date))}
            ${field('Approver', o.approver_name || o.approver_label)}
            ${field('Employee', `${o.requester_name} (${o.req_code})`)}
            ${field('Designation', o.designation || '—')}
            ${field('Out-time', o.out_time)}
            ${o.type === 'gatepass' ? field('In-time', o.in_time || '—') : ''}
          </div>
          <div>${label('Purpose')}<p class="text-ink">${o.purpose}</p></div>
          ${o.actioned_at ? `<div class="text-xs text-slate-500">${o.status === 'approved' ? 'Approved' : 'Rejected'} by ${o.actioned_by_name} · ${fmtDateTime(o.actioned_at)}</div>` : ''}
          ${rejBox}
          ${dl}
          ${actions}
          <div id="rejectArea"></div>
        </div>`;
      document.getElementById('ogModal').classList.remove('hidden');
    }
    const field = (k, v) => `<div>${label(k)}<div class="text-ink font-medium">${v}</div></div>`;
    const label = (k) => `<div class="eyebrow mb-0.5" style="font-size:.6rem">${k}</div>`;

    function showReject(id) {
      document.getElementById('rejectArea').innerHTML = `
        <div class="border border-line rounded-xl p-3">
          <label class="fieldlabel">Reason for rejection</label>
          <textarea id="rejReason" rows="2" class="field" placeholder="Tell the requester why"></textarea>
          <div class="flex justify-end mt-2">
            <button onclick="reject(${id})" class="text-white text-sm font-semibold px-4 py-2 rounded-xl bg-red-600 hover:bg-red-700">Send rejection</button>
          </div>
        </div>`;
    }

    async function approve(id) {
      try { await api('/outpass/' + id + '/approve', { method: 'POST' });
        toast('Approved — pass sent to requester', 'success'); closeModal(); afterAction();
      } catch (e) { toast(e.message, 'error'); }
    }
    async function reject(id) {
      const reason = (document.getElementById('rejReason').value || '').trim();
      if (!reason) return toast('Add a reason', 'error');
      try { await api('/outpass/' + id + '/reject', { method: 'POST', body: { reason } });
        toast('Rejected — requester notified', 'success'); closeModal(); afterAction();
      } catch (e) { toast(e.message, 'error'); }
    }
    function afterAction() { refreshApprCount(); loadList('approvals', 'apprList'); }
    function closeModal() { document.getElementById('ogModal').classList.add('hidden'); }

    async function logout() { await api('/logout', { method: 'POST' }); location.href = '/'; }
    init().catch(e => { console.error(e); location.href = '/'; });
  </script>
</body>
</html>
