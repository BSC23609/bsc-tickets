<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSC Tickets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: {
      50:'#EAF2F8', 100:'#D5E6F1', 300:'#7FB3D5', 500:'#1B7BC0',
      600:'#0E6AA6', 700:'#0A557F', 800:'#0A4566', ink:'#112532'
    } } } } };
  </script>
  <style>body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}[x-cloak]{display:none}</style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
      <img src="/img/group-logo.png" alt="The Bharat Steel Group" class="h-7 shrink-0" />
      <div class="flex items-center gap-3 text-sm">
        <a id="adminLink" href="/admin.html" class="hidden text-brand-600 font-semibold">Admin Dashboard</a>
        <span id="who" class="hidden sm:inline text-slate-500"></span>
        <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sign out</button>
      </div>
      <img src="/img/bsc-logo.png" alt="Bharat Steel (Chennai)" class="h-7 shrink-0" />
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <!-- Tabs -->
    <div class="flex gap-1 border-b border-slate-200 mb-5">
      <button data-tab="raise" class="tabBtn px-4 py-2.5 text-sm font-semibold border-b-2 border-brand-600 text-brand-600">Raise Ticket</button>
      <button data-tab="mine" class="tabBtn px-4 py-2.5 text-sm font-semibold border-b-2 border-transparent text-slate-500">My Tickets</button>
      <button data-tab="assigned" id="assignedTab" class="tabBtn hidden px-4 py-2.5 text-sm font-semibold border-b-2 border-transparent text-slate-500">Assigned to Me</button>
    </div>

    <!-- RAISE -->
    <section id="tab-raise">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 max-w-2xl">
        <h2 class="font-bold mb-4">New Ticket</h2>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="lbl">Category *</label>
            <select id="f_category" class="inp" onchange="onCategoryChange()"></select>
          </div>
          <div id="tradeWrap" class="hidden">
            <label class="lbl">Trade *</label>
            <select id="f_trade" class="inp"></select>
          </div>
          <div>
            <label class="lbl">Priority</label>
            <select id="f_priority" class="inp">
              <option>Low</option><option selected>Medium</option><option>High</option><option>Critical</option>
            </select>
          </div>
          <div>
            <label class="lbl">Location</label>
            <select id="f_location" class="inp"><option value="">— select —</option></select>
          </div>
          <div class="sm:col-span-2">
            <label class="lbl">Subject *</label>
            <input id="f_subject" class="inp" placeholder="Short summary of the issue" />
          </div>
          <div class="sm:col-span-2">
            <label class="lbl">Description</label>
            <textarea id="f_description" rows="3" class="inp" placeholder="Detail of the complaint"></textarea>
          </div>
          <div class="sm:col-span-2">
            <label class="lbl">Photos <span class="text-slate-400 font-normal normal-case">(up to 5 — camera or gallery)</span></label>
            <input id="f_photos" type="file" accept="image/*" capture="environment" multiple
                   class="block w-full text-sm text-slate-600 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-brand-50 file:text-brand-700 file:font-semibold" />
            <div id="photoPreview" class="flex gap-2 flex-wrap mt-2"></div>
          </div>
        </div>
        <div class="mt-5 flex justify-end">
          <button id="submitBtn" onclick="submitTicket()" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-lg shadow">Submit ticket</button>
        </div>
      </div>
    </section>

    <!-- MINE / ASSIGNED share a list renderer -->
    <section id="tab-mine" class="hidden"><div id="mineList" class="space-y-2"></div></section>
    <section id="tab-assigned" class="hidden"><div id="assignedList" class="space-y-2"></div></section>
  </main>

  <!-- Detail modal -->
  <div id="detail" class="hidden fixed inset-0 bg-black/50 z-40 flex items-start justify-center p-4 overflow-y-auto" onclick="if(event.target===this)closeDetail()">
    <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full my-8" id="detailInner"></div>
  </div>

  <style>
    .lbl{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:.25rem}
    .inp{width:100%;border-radius:.5rem;border-color:#cbd5e1;font-size:.875rem}
    .inp:focus{border-color:#0E6AA6;box-shadow:0 0 0 1px #0E6AA6}
  </style>

  <script src="/js/common.js"></script>
  <script>
    let me = {}, meta = {}, selectedPhotos = [];

    async function init() {
      me = await api('/me');
      document.getElementById('who').textContent = `${me.name} · ${me.emp_no}`;
      if (me.is_admin) document.getElementById('adminLink').classList.remove('hidden');
      meta = await api('/tickets/meta');
      fillForm();
      // show "Assigned" tab only if the user handles any category/trade
      const assigned = await api('/tickets?scope=assigned');
      if (assigned.length) document.getElementById('assignedTab').classList.remove('hidden');
      setupTabs();
    }

    function fillForm() {
      const c = document.getElementById('f_category');
      c.innerHTML = '<option value="">— select —</option>' +
        meta.categories.map(x => `<option value="${x.id}" data-trades="${x.has_trades}">${x.name}</option>`).join('');
      const l = document.getElementById('f_location');
      l.innerHTML = '<option value="">— select —</option>' +
        meta.locations.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
      document.getElementById('f_photos').addEventListener('change', onPhotoPick);
    }

    function onCategoryChange() {
      const sel = document.getElementById('f_category');
      const hasTrades = sel.selectedOptions[0]?.dataset.trades === 'true';
      const wrap = document.getElementById('tradeWrap');
      const t = document.getElementById('f_trade');
      if (hasTrades) {
        const cid = +sel.value;
        t.innerHTML = '<option value="">— select —</option>' +
          meta.trades.filter(x => x.category_id === cid).map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        wrap.classList.remove('hidden');
      } else { wrap.classList.add('hidden'); t.innerHTML = ''; }
    }

    function onPhotoPick(e) {
      selectedPhotos = Array.from(e.target.files).slice(0, 5);
      const p = document.getElementById('photoPreview');
      p.innerHTML = selectedPhotos.map(f => `<span class="text-xs bg-slate-100 px-2 py-1 rounded">${f.name}</span>`).join('');
      if (e.target.files.length > 5) toast('Only the first 5 photos will be uploaded', 'info');
    }

    async function submitTicket() {
      const category_id = +document.getElementById('f_category').value;
      const subject = document.getElementById('f_subject').value.trim();
      if (!category_id) return toast('Choose a category', 'error');
      if (!subject) return toast('Enter a subject', 'error');
      const hasTrades = document.getElementById('f_category').selectedOptions[0]?.dataset.trades === 'true';
      const trade_id = +document.getElementById('f_trade').value || null;
      if (hasTrades && !trade_id) return toast('Choose a trade', 'error');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Submitting…';
      try {
        const r = await api('/tickets', { method: 'POST', body: {
          category_id, trade_id,
          priority: document.getElementById('f_priority').value,
          subject, description: document.getElementById('f_description').value.trim(),
          location_id: +document.getElementById('f_location').value || null,
        }});
        // upload photos (direct to OneDrive) after the ticket exists
        for (const f of selectedPhotos) {
          try { await uploadPhotoToOneDrive(r.id, f, 'issue'); } catch (e) { toast('Photo: ' + e.message, 'error'); }
        }
        toast(`Ticket ${r.ref_no} created`, 'success');
        resetForm();
        switchTab('mine');
      } catch (e) { toast(e.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Submit ticket'; }
    }

    function resetForm() {
      ['f_subject','f_description'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f_category').value = '';
      document.getElementById('f_location').value = '';
      document.getElementById('tradeWrap').classList.add('hidden');
      document.getElementById('f_photos').value = '';
      document.getElementById('photoPreview').innerHTML = '';
      selectedPhotos = [];
    }

    // ---- tabs ----
    function setupTabs() {
      document.querySelectorAll('.tabBtn').forEach(b =>
        b.addEventListener('click', () => switchTab(b.dataset.tab)));
    }
    function switchTab(tab) {
      document.querySelectorAll('.tabBtn').forEach(b => {
        const on = b.dataset.tab === tab;
        b.classList.toggle('border-brand-600', on); b.classList.toggle('text-brand-600', on);
        b.classList.toggle('border-transparent', !on); b.classList.toggle('text-slate-500', !on);
      });
      ['raise','mine','assigned'].forEach(t =>
        document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab));
      if (tab === 'mine') loadList('mine', 'mineList');
      if (tab === 'assigned') loadList('assigned', 'assignedList');
    }

    async function loadList(scope, elId) {
      const el = document.getElementById(elId);
      el.innerHTML = '<div class="text-sm text-slate-400 py-8 text-center">Loading…</div>';
      const rows = await api(`/tickets?scope=${scope}`);
      if (!rows.length) { el.innerHTML = '<div class="text-sm text-slate-400 py-12 text-center">No tickets.</div>'; return; }
      el.innerHTML = rows.map(t => card(t, scope)).join('');
    }

    function card(t, scope) {
      const who = scope === 'assigned' ? `From ${t.requester_name}` : (t.l1_name ? `Handler: ${t.l1_name}` : '');
      return `<div onclick="openDetail(${t.id})" class="bg-white rounded-xl border border-slate-200 p-4 hover:border-brand-300 cursor-pointer">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-mono text-[11px] text-slate-400">${t.ref_no}</span>
              ${statusBadge(t.status)} ${priorityBadge(t.priority)}
              ${t.escalation_level ? `<span class="text-[11px] font-semibold text-red-600">↑ L${t.escalation_level}</span>` : ''}
            </div>
            <div class="font-semibold text-slate-800 mt-1 truncate">${t.subject}</div>
            <div class="text-xs text-slate-500 mt-0.5">${t.category_name}${t.trade_name ? ' · ' + t.trade_name : ''} · ${who}</div>
          </div>
          <div class="text-right text-[11px] text-slate-400 shrink-0">
            <div>${fmtDateTime(t.raised_at)}</div>
            ${t.status==='closed' ? `<div class="text-emerald-600 font-semibold mt-1">${fmtDuration(t.downtime_mins)}</div>` : ''}
          </div>
        </div>
      </div>`;
    }

    // ---- detail ----
    async function openDetail(id) {
      const t = await api('/tickets/' + id);
      const p = t.perms;
      const esc = t.escalation;
      const actions = [];

      if (p.isHandler && ['open','reopened'].includes(t.status))
        actions.push(btn(`startTicket(${id})`, 'Start working', 'brand'));
      if (p.isHandler && ['open','in_progress','reopened'].includes(t.status))
        actions.push(btn(`resolveTicket(${id})`, 'Mark resolved', 'violet'));
      if (p.isRequester && t.status === 'resolved') {
        actions.push(btn(`confirmTicket(${id})`, 'Confirm & close', 'emerald'));
        actions.push(btn(`reopenTicket(${id})`, 'Not resolved — reopen', 'orange'));
      }
      if (p.isRequester && (esc.canEscalateL2 || esc.canEscalateL3))
        actions.push(btn(`escalateTicket(${id})`, `Escalate to L${esc.canEscalateL2 ? 2 : 3}`, 'red'));

      const escHint = (p.isRequester && !esc.canEscalateL2 && !esc.canEscalateL3 && esc.l2ReadyAt && t.escalation_level < 2)
        ? `<div class="text-[11px] text-slate-400 mt-1">Escalation available after ${fmtDateTime(esc.l2ReadyAt)}</div>` : '';

      const photos = t.photos.filter(x => x.kind === 'issue');
      const resPhotos = t.photos.filter(x => x.kind === 'resolution');

      document.getElementById('detailInner').innerHTML = `
        <div class="p-5 border-b border-slate-200 flex items-start justify-between">
          <div>
            <div class="font-mono text-[11px] text-slate-400">${t.ref_no}</div>
            <h3 class="font-bold text-lg">${t.subject}</h3>
            <div class="flex items-center gap-2 mt-1">${statusBadge(t.status)} ${priorityBadge(t.priority)}
              ${t.escalation_level ? `<span class="text-[11px] font-semibold text-red-600">Escalated → L${t.escalation_level}</span>` : ''}</div>
          </div>
          <button onclick="closeDetail()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
        </div>
        <div class="p-5 space-y-4 text-sm">
          <div class="grid grid-cols-2 gap-3">
            ${field('Category', t.category_name + (t.trade_name ? ' · ' + t.trade_name : ''))}
            ${field('Location', t.location_text || '—')}
            ${field('Requester', `${t.requester_name} (${t.requester_dept || ''})`)}
            ${field('Raised', fmtDateTime(t.raised_at))}
            ${field('Handler L1', t.l1_name || '—')}
            ${field('Downtime', t.status==='closed' ? fmtDuration(t.downtime_mins) : '—')}
          </div>
          ${t.description ? `<div>${label('Description')}<p class="text-slate-700 whitespace-pre-wrap">${t.description}</p></div>` : ''}
          ${photos.length ? `<div>${label('Photos')}<div class="flex gap-2 flex-wrap">${photos.map(ph => `<a href="${ph.web_url}" target="_blank" class="text-xs bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded">${ph.file_name} ↗</a>`).join('')}</div></div>` : ''}
          ${t.resolution_note ? `<div class="bg-violet-50 border border-violet-200 rounded-lg p-3">${label('Resolution note')}<p class="text-slate-700">${t.resolution_note}</p>${resPhotos.map(ph=>`<a href="${ph.web_url}" target="_blank" class="text-xs text-violet-700 underline mr-2">${ph.file_name} ↗</a>`).join('')}</div>` : ''}
          <div>${label('Timeline')}
            <ol class="space-y-1.5">${t.events.map(ev => `<li class="flex gap-2 text-xs"><span class="text-slate-400 w-28 shrink-0">${fmtDateTime(ev.at)}</span><span class="text-slate-700"><b>${evLabel(ev.event)}</b>${ev.by_name ? ' · ' + ev.by_name : ''}${ev.note ? ' — ' + ev.note : ''}</span></li>`).join('')}</ol>
          </div>
          ${escHint}
          <div class="flex flex-wrap gap-2 pt-2">${actions.join('')}</div>
        </div>`;
      document.getElementById('detail').classList.remove('hidden');
    }
    const field = (k,v) => `<div>${label(k)}<div class="text-slate-700">${v}</div></div>`;
    const label = (k) => `<div class="text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-0.5">${k}</div>`;
    const btn = (fn, txt, color) => `<button onclick="${fn}" class="bg-${color}-600 hover:bg-${color}-700 text-white text-sm font-semibold px-4 py-2 rounded-lg">${txt}</button>`;
    const evLabel = (e) => ({raised:'Raised',in_progress:'In progress',escalated_l2:'Escalated to L2',escalated_l3:'Escalated to L3',resolved:'Resolved',confirmed_closed:'Closed (confirmed)',auto_closed:'Auto-closed',reopened:'Reopened'}[e] || e);
    function closeDetail(){ document.getElementById('detail').classList.add('hidden'); refreshCurrent(); }
    function refreshCurrent(){ const open=['mine','assigned'].find(t=>!document.getElementById('tab-'+t).classList.contains('hidden')); if(open) loadList(open, open+'List'); }

    async function startTicket(id){ await act(id,'in-progress','Marked in progress'); }
    async function confirmTicket(id){ await act(id,'confirm','Ticket closed'); }
    async function escalateTicket(id){ await act(id,'escalate','Escalated'); }
    async function resolveTicket(id){
      const note = prompt('Resolution note (optional):') || '';
      try { await api(`/tickets/${id}/resolve`, {method:'POST', body:{note}}); toast('Resolved — requester notified','success'); openDetail(id); }
      catch(e){ toast(e.message,'error'); }
    }
    async function reopenTicket(id){
      const reason = prompt('Why is this not resolved? (optional)') || '';
      try { await api(`/tickets/${id}/reopen`, {method:'POST', body:{reason}}); toast('Reopened','success'); openDetail(id); }
      catch(e){ toast(e.message,'error'); }
    }
    async function act(id, path, msg){
      try { await api(`/tickets/${id}/${path}`, {method:'POST'}); toast(msg,'success'); openDetail(id); }
      catch(e){ toast(e.message,'error'); }
    }

    async function logout(){ await api('/logout',{method:'POST'}); location.href='/'; }
    init().catch(e => { console.error(e); toast(e.message,'error'); });
  </script>
</body>
</html>
