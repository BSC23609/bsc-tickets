<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSC Tickets — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}</style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 text-white text-2xl font-bold shadow-lg">BSC</div>
      <h1 class="mt-3 text-xl font-bold text-slate-800">Ticket Management</h1>
      <p class="text-sm text-slate-500">Bharat Steel (Chennai)</p>
    </div>

    <!-- Sign in -->
    <div id="loginCard" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Employee Number</label>
      <input id="empNo" placeholder="e.g. BSC/006" autocomplete="username"
             class="w-full rounded-lg border-slate-300 mb-3 focus:border-blue-500 focus:ring-blue-500" />
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Password</label>
      <input id="pw" type="password" autocomplete="current-password"
             class="w-full rounded-lg border-slate-300 mb-4 focus:border-blue-500 focus:ring-blue-500"
             onkeydown="if(event.key==='Enter')doLogin()" />
      <button onclick="doLogin()" id="loginBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow">Sign in</button>
      <p class="text-[11px] text-slate-400 mt-3 text-center">First login: use the default password, then set your own.</p>
    </div>

    <!-- Forced change -->
    <div id="changeCard" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h2 class="font-bold text-slate-800 mb-1">Set your password</h2>
      <p class="text-xs text-slate-500 mb-4">This is your first sign-in. Choose a new password.</p>
      <input id="newPw" type="password" placeholder="New password (min 6 chars)"
             class="w-full rounded-lg border-slate-300 mb-3 focus:border-blue-500 focus:ring-blue-500" />
      <input id="newPw2" type="password" placeholder="Confirm new password"
             class="w-full rounded-lg border-slate-300 mb-4 focus:border-blue-500 focus:ring-blue-500" />
      <button onclick="doChange()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow">Save & continue</button>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    let _isAdmin = false;
    async function doLogin() {
      const emp_no = document.getElementById('empNo').value.trim();
      const password = document.getElementById('pw').value;
      if (!emp_no || !password) return toast('Enter employee number and password', 'error');
      try {
        const r = await api('/login', { method: 'POST', body: { emp_no, password } });
        _isAdmin = r.is_admin;
        if (r.must_reset) {
          document.getElementById('loginCard').classList.add('hidden');
          document.getElementById('changeCard').classList.remove('hidden');
        } else { go(); }
      } catch (e) { toast(e.message, 'error'); }
    }
    async function doChange() {
      const a = document.getElementById('newPw').value, b = document.getElementById('newPw2').value;
      if (a.length < 6) return toast('Password must be at least 6 characters', 'error');
      if (a !== b) return toast('Passwords do not match', 'error');
      try { await api('/change-password', { method: 'POST', body: { new_password: a } });
        toast('Password set', 'success'); setTimeout(go, 500); }
      catch (e) { toast(e.message, 'error'); }
    }
    function go() { location.href = _isAdmin ? '/admin.html' : '/app.html'; }
  </script>
</body>
</html>
