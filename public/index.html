  <main class="flex-1 flex flex-col items-center justify-center w-full relative z-10">
  <div class="w-full max-w-sm in">
    <div class="text-center mb-7">
      <img src="/img/bsc-logo.png" alt="Bharat Steel (Chennai)" class="h-12 mx-auto" />
      <div class="seam w-16 mx-auto mt-5 rounded-full"></div>
      <div class="eyebrow mt-4">Internal Support</div>
      <h1 class="font-display text-2xl font-bold text-ink mt-1">BSC Portal</h1>
    </div>

    <!-- Sign in -->
    <div id="loginCard" class="card p-6">
      <label class="fieldlabel">Employee Number</label>
      <input id="empNo" placeholder="e.g. BSC/006" autocomplete="username" class="field mono mb-4" />
      <label class="fieldlabel">Password</label>
      <input id="pw" type="password" autocomplete="current-password" class="field mb-5"
             onkeydown="if(event.key==='Enter')doLogin()" />
      <button onclick="doLogin()" id="loginBtn" class="btn w-full">Sign in</button>
      <p class="text-[11px] text-slate-400 mt-4 text-center">First time? Use the default password — you'll set your own next.</p>
    </div>

    <!-- Forced change -->
    <div id="changeCard" class="hidden card p-6">
      <div class="eyebrow mb-1">First sign-in</div>
      <h2 class="font-display font-bold text-ink text-lg mb-1">Set your password</h2>
      <p class="text-xs text-slate-500 mb-5">Choose a password only you know — at least 6 characters.</p>
      <input id="newPw" type="password" placeholder="New password" class="field mb-3" />
      <input id="newPw2" type="password" placeholder="Confirm new password" class="field mb-5" />
      <button onclick="doChange()" class="btn w-full">Save and continue</button>
    </div>
  </div>
  </main>

  <footer class="py-2 flex flex-col items-center gap-1">
    <span class="text-[10px] uppercase tracking-widest text-slate-400">A unit of</span>
    <img src="/img/group-logo.png" alt="The Bharat Steel Group" class="h-6 opacity-80" />
  </footer>

  <script src="/js/common.js?v=86"></script>
  <script>
    let _isAdmin = false;
    // Deep link: /t/<id> redirects here as /?t=<id>. Carry it through login.
    const targetTicket = new URLSearchParams(location.search).get('t');
    const targetOg = new URLSearchParams(location.search).get('og');
    const targetClaim = new URLSearchParams(location.search).get('claim');

    // On launch, honour an existing session. If already signed in, go straight through
    // (to the deep-link target, otherwise home). Only reveal the login form when there's
    // no valid session — so a signed-in user is never asked to log in again. The stored
    // token covers installed PWAs that drop the cookie when the app is closed.
    (async () => {
      let tok = null; try { tok = localStorage.getItem('bsc_token'); } catch {}
      try {
        const r = await fetch('/api/me', { credentials: 'same-origin', headers: tok ? { Authorization: 'Bearer ' + tok } : {} });
        if (r.ok) {
          const me = await r.json().catch(() => null);
          if (me && me.token) { try { localStorage.setItem('bsc_token', me.token); } catch {} }
          go(); return;
        }
      } catch {}
      try { localStorage.removeItem('bsc_token'); } catch {}
      if (window.hideBscSplash) window.hideBscSplash();   // not signed in → show login
    })();

    async function doLogin() {
      const emp_no = document.getElementById('empNo').value.trim();
      const password = document.getElementById('pw').value;
      if (!emp_no || !password) return toast('Enter employee number and password', 'error');
      try {
        const r = await api('/login', { method: 'POST', body: { emp_no, password } });
        _isAdmin = r.is_admin;
        if (r.must_reset) {
          document.getElementById('loginCard').classList.add('hidden');
          document.getElementById('changeCard').classList.remove('hidden');
        } else { go(); }
      } catch (e) { toast(e.message, 'error'); }
    }
    async function doChange() {
      const a = document.getElementById('newPw').value, b = document.getElementById('newPw2').value;
      if (a.length < 6) return toast('Password must be at least 6 characters', 'error');
      if (a !== b) return toast('Passwords do not match', 'error');
      try { await api('/change-password', { method: 'POST', body: { new_password: a } });
        toast('Password set', 'success'); setTimeout(go, 500); }
      catch (e) { toast(e.message, 'error'); }
    }
    function go() {
      if (targetTicket) location.href = '/app.html?t=' + encodeURIComponent(targetTicket);
      else if (targetOg) location.href = '/outpass.html?id=' + encodeURIComponent(targetOg);
      else if (targetClaim) location.href = '/expense.html?claim=' + encodeURIComponent(targetClaim);
      else location.href = '/home.html';
    }
  </script>
