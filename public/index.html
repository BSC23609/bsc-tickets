<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSC Tickets — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: {
      50:'#EAF2F8', 100:'#D5E6F1', 300:'#7FB3D5', 500:'#1B7BC0',
      600:'#0E6AA6', 700:'#0A557F', 800:'#0A4566', ink:'#112532'
    } } } } };
  </script>
  <style>body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}</style>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col p-4">
  <main class="flex-1 flex flex-col items-center justify-center w-full">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <img src="/img/bsc-logo.png" alt="Bharat Steel (Chennai)" class="h-12 mx-auto" />
      <h1 class="mt-4 text-lg font-bold text-slate-800">Ticket Management System</h1>
    </div>

    <!-- Sign in -->
    <div id="loginCard" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Employee Number</label>
      <input id="empNo" placeholder="e.g. BSC/006" autocomplete="username"
             class="w-full rounded-lg border-slate-300 mb-3 focus:border-brand-500 focus:ring-brand-500" />
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Password</label>
      <input id="pw" type="password" autocomplete="current-password"
             class="w-full rounded-lg border-slate-300 mb-4 focus:border-brand-500 focus:ring-brand-500"
             onkeydown="if(event.key==='Enter')doLogin()" />
      <button onclick="doLogin()" id="loginBtn"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg shadow">Sign in</button>
      <p class="text-[11px] text-slate-400 mt-3 text-center">First login: use the default password, then set your own.</p>
    </div>

    <!-- Forced change -->
    <div id="changeCard" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h2 class="font-bold text-slate-800 mb-1">Set your password</h2>
      <p class="text-xs text-slate-500 mb-4">This is your first sign-in. Choose a new password.</p>
      <input id="newPw" type="password" placeholder="New password (min 6 chars)"
             class="w-full rounded-lg border-slate-300 mb-3 focus:border-brand-500 focus:ring-brand-500" />
      <input id="newPw2" type="password" placeholder="Confirm new password"
             class="w-full rounded-lg border-slate-300 mb-4 focus:border-brand-500 focus:ring-brand-500" />
      <button onclick="doChange()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg shadow">Save & continue</button>
    </div>
  </div>
  </main>

  <footer class="py-2 flex flex-col items-center gap-1">
    <span class="text-[10px] uppercase tracking-widest text-slate-400">A unit of</span>
    <img src="/img/group-logo.png" alt="The Bharat Steel Group" class="h-6 opacity-80" />
  </footer>

  <script src="/js/common.js"></script>
  <script>
    let _isAdmin = false;
    // Deep link: /t/<id> redirects here as /?t=<id>. Carry it through login.
    const targetTicket = new URLSearchParams(location.search).get('t');

    // If a valid session already exists and we have a deep-link target, skip login.
    (async () => {
      if (!targetTicket) return;
      try {
        const r = await fetch('/api/me', { credentials: 'same-origin' });
        if (r.ok) go();
      } catch {}
    })();

    async function doLogin() {
      const emp_no = document.getElementById('empNo').value.trim();
      const password = document.getElementById('pw').value;
      if (!emp_no || !password) return toast('Enter employee number and password', 'error');
      try {
        const r = await api('/login', { method: 'POST', body: { emp_no, password } });
        _isAdmin = r.is_admin;
        if (r.must_reset) {
          document.getElementById('loginCard').classList.add('hidden');
          document.getElementById('changeCard').classList.remove('hidden');
        } else { go(); }
      } catch (e) { toast(e.message, 'error'); }
    }
    async function doChange() {
      const a = document.getElementById('newPw').value, b = document.getElementById('newPw2').value;
      if (a.length < 6) return toast('Password must be at least 6 characters', 'error');
      if (a !== b) return toast('Passwords do not match', 'error');
      try { await api('/change-password', { method: 'POST', body: { new_password: a } });
        toast('Password set', 'success'); setTimeout(go, 500); }
      catch (e) { toast(e.message, 'error'); }
    }
    function go() {
      location.href = '/app.html' + (targetTicket ? ('?t=' + encodeURIComponent(targetTicket)) : '');
    }
  </script>
</body>
</html>
