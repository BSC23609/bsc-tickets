name: Ticket escalation reminders

# Pings the escalation engine every 15 minutes. The endpoint itself only sends
# during working hours (Mon–Sat 09:30–18:00 IST, minus holidays), so running
# round-the-clock is harmless — off-hours runs simply no-op.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/escalate
        run: |
          curl -fsS -X POST "https://tickets.bharatsteels.in/api/cron/escalate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
