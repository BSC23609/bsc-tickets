name: Ticket escalation reminders

# Pings the escalation engine every 15 minutes. The endpoint returns immediately and
# sends reminders in the background, so this job is fast and only fails on a real 4xx/5xx.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/escalate
        run: |
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X POST \
            "https://tickets.bharatsteels.in/api/cron/escalate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"; echo "Response:"; cat /tmp/resp.txt; echo
          if [ "$code" -ge 400 ]; then echo "::error::escalate returned $code"; exit 1; fi
