name: Keep database warm

# Neon suspends the compute after ~5 min idle, so the first request after a quiet
# spell is slow ("waking up"). This pings a DB-touching endpoint during working hours
# so the gate/return screens stay instant when people actually use them. It lets the
# database sleep overnight to save compute.
#
# NOTE: GitHub's scheduled runs are best-effort and can be delayed under load, so each
# run pings a few times across ~5 minutes to bridge small gaps. If you want rock-solid
# timing with zero GitHub minutes, point an UptimeRobot monitor at the same URL instead
# (5-minute interval, free): https://tickets.bharatsteels.in/api/keepalive

on:
  schedule:
    # Every 5 minutes. Cron is UTC: 00:00–16:55 UTC ≈ 05:30–22:25 IST (working hours).
    - cron: '*/5 0-16 * * *'
  workflow_dispatch: {}

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping keep-alive endpoint a few times across ~5 min
        run: |
          URL="https://tickets.bharatsteels.in/api/keepalive"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 45 "$URL" || echo 000)
            echo "ping $i -> HTTP $code"
            if [ "$i" -lt 4 ]; then sleep 80; fi
          done
